<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | TodoFlow</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#f7f8fc;color:#1f2430;display:grid;place-items:center;min-height:100vh;padding:20px}
    .card{max-width:360px;background:#fff;border:1px solid #e6e8f0;border-radius:24px;padding:30px 24px;text-align:center;box-shadow:0 18px 30px rgba(0,0,0,.08)}
    .icon{width:70px;height:70px;border-radius:22px;margin:0 auto 14px;background:#f0ebfa;color:#6746a8;display:grid;place-items:center;font-size:28px;font-weight:700}
    h1{font-size:18px;margin:0 0 10px}p{font-size:14px;color:#6b7280;line-height:1.55;margin:0}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">Wi</div>
    <h1>No internet connection</h1>
    <p>Your workspace is offline right now. Please reconnect to continue using TodoFlow.</p>
  </div>
</body>
</html>
